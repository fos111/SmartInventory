name: Deploy to Azure App Service

on:
  workflow_run:
    workflows: ["Docker - Build & Push to GHCR"]
    types:
      - completed
    branches: [ "main" ]
  workflow_dispatch:
    inputs:
      image_tag:
        description: 'Image tag to deploy (SHA or latest)'
        required: true
        default: 'latest'

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: beta
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}

    steps:
      - name: Determine image tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "TAG=${{ github.event.inputs.image_tag }}" >> $GITHUB_OUTPUT
          else
            echo "TAG=${{ github.event.workflow_run.head_sha }}" >> $GITHUB_OUTPUT
          fi

      - name: Deploy to Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ secrets.WEB_APP_NAME }}
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          images: "${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.tag.outputs.TAG }}"
          container-registry-url: "https://${{ env.REGISTRY }}"
          container-registry-user: ${{ secrets.GHCR_USERNAME }}
          container-registry-password: ${{ secrets.GHCR_PULL_TOKEN }}
