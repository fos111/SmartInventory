name: CI - Build & Test

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "main" ]

env:
  DOTNET_VERSION: '8.0.x'

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore -c Release

      - name: Test
        run: dotnet test --no-build -c Release --collect:"XPlat Code Coverage" --results-directory TestResults

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: TestResults

  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: build-and-test

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check for Dockerfile changes
        id: changed
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            BASE_SHA="${{ github.event.pull_request.base.sha }}"
          else
            BASE_SHA="${{ github.event.before }}"
          fi
          CHANGED=$(git diff --name-only "$BASE_SHA" "${{ github.sha }}" | grep -c -E '^(Dockerfile|\.dockerignore|docker-compose\.yml)' || true)
          echo "changed=$CHANGED" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        if: steps.changed.outputs.changed != '0'
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        if: steps.changed.outputs.changed != '0'
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          tags: smartinventory:ci-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Skip notice
        if: steps.changed.outputs.changed == '0'
        run: echo "No Dockerfile changes detected, skipping Docker build."

