name: CI/CD Pipeline

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

env:
  DOTNET_VERSION: '8.0.x'
  REGISTRY: ghcr.io

jobs:

  # ════════════════════════════════════════════════════════════
  # CI — Build, Test & Docker Build Verification
  # ════════════════════════════════════════════════════════════

  build-and-test:
    name: CI - Build & Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore -c Release

      - name: Test
        run: dotnet test --no-build -c Release --collect:"XPlat Code Coverage" --results-directory TestResults

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: TestResults

  docker-verify:
    name: CI - Docker Build (Verify)
    runs-on: ubuntu-latest
    needs: build-and-test
    if: github.event_name == 'pull_request'

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check for Dockerfile changes
        id: changed
        run: |
          CHANGED=$(git diff --name-only "${{ github.event.pull_request.base.sha }}" "${{ github.sha }}" \
            | grep -c -E '^(Dockerfile|\.dockerignore|docker-compose\.yml)' || true)
          echo "changed=$CHANGED" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        if: steps.changed.outputs.changed != '0'
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        if: steps.changed.outputs.changed != '0'
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          tags: smartinventory:ci-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Skip notice
        if: steps.changed.outputs.changed == '0'
        run: echo "No Dockerfile changes detected, skipping Docker build."

  # ── lint (disabled) ───────────────────────────
  # lint:
  #   name: Code Quality
  #   runs-on: ubuntu-latest
  #   steps:
  #     - uses: actions/checkout@v4
  #     - uses: actions/setup-dotnet@v4
  #       with:
  #         dotnet-version: ${{ env.DOTNET_VERSION }}
  #     - name: Restore
  #       run: dotnet restore
  #     - name: Check formatting
  #       run: dotnet format --verify-no-changes --verbosity diagnostic

  # ════════════════════════════════════════════════════════════
  # CD — Docker Push & Azure Deploy (main branch only)
  # ════════════════════════════════════════════════════════════

  docker-push:
    name: CD - Docker Build & Push to GHCR
    runs-on: ubuntu-latest
    needs: build-and-test
    if: |
      github.ref == 'refs/heads/main' &&
      (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
    permissions:
      contents: read
      packages: write
    outputs:
      image_tag: ${{ steps.tag.outputs.TAG }}

    steps:
      - uses: actions/checkout@v4

      - name: Set image name to lowercase
        run: echo "IMAGE_NAME=${GITHUB_REPOSITORY,,}" >> $GITHUB_ENV

      - name: Determine image tag
        id: tag
        run: echo "TAG=${{ github.sha }}" >> $GITHUB_OUTPUT

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.tag.outputs.TAG }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: CD - Deploy to Azure App Service
    runs-on: ubuntu-latest
    needs: docker-push
    if: always() && needs.docker-push.result == 'success'
    environment: beta

    steps:
      - name: Set image name to lowercase
        run: echo "IMAGE_NAME=${GITHUB_REPOSITORY,,}" >> $GITHUB_ENV

      - name: Deploy to Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ secrets.WEB_APP_NAME }}
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          images: "${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ needs.docker-push.outputs.image_tag }}"
          container-registry-url: "https://${{ env.REGISTRY }}"
          container-registry-user: ${{ secrets.GHCR_USERNAME }}
          container-registry-password: ${{ secrets.GHCR_PULL_TOKEN }}
